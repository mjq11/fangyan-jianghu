version: '3.9'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: fangyan-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fangyan_jianghu
      POSTGRES_USER: fangyan
      POSTGRES_PASSWORD: fangyan_secret_2024
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fangyan -d fangyan_jianghu']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fangyan-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data: